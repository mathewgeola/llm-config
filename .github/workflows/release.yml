name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12.10'
          enable-cache: true

      - run: uv build

      - run: uv publish --trusted-publishing always

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          draft: false
          prerelease: false
